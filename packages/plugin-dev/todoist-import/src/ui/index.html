    <link

      href="data:,"
    />
    <style>
      body {
        max-width: 640px;
        margin: 0 auto;
        padding: var(--s2);
      }
      .muted {
        opacity: 0.7;
        font-size: 0.9em;
      }
      .warn {
        color: var(--color-warning);
        font-size: 0.9em;
      }
      .error {
        color: var(--color-danger);
      }
      ul {
        padding-left: var(--s3);
      }
      li {
        margin: var(--s-half) 0;
      }
      label {
        display: block;
        margin: var(--s-half) 0;
      }
      input[type='password'] {
        width: 100%;
        box-sizing: border-box;
        margin: var(--s) 0;
      }
      .actions {
        margin-top: var(--s2);
        display: flex;
        gap: var(--s);
      }
    </style>
