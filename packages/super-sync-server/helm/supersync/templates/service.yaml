apiVersion: v1
kind: Service
metadata:
  name: {{ include "supersync.fullname" . }}
  labels:
    {{- include "supersync.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.supersync.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "supersync.selectorLabels" . | nindent 4 }}
