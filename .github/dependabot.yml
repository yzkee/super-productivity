# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ==========================================
  # npm Dependencies (Monthly Updates)
  # ==========================================
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Berlin'
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10

    reviewers:
      - 'johannesjo'

    labels:
      - 'dependencies'
      - 'npm'

    commit-message:
      prefix: 'chore(deps)'

    # Group tightly-coupled families into a single PR. These packages pin each
    # other's peer versions in lockstep (e.g. @ngrx/effects peer-requires an
    # exact @ngrx/store), so a single-package bump can never resolve `npm ci`
    # on its own — it must move as a set. Each group bundles all update types
    # (major/minor/patch) since a major moves the whole family at once.
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@schematics/angular'
      angular-eslint:
        patterns:
          - '@angular-eslint/*'
          - 'angular-eslint'
      ngrx:
        patterns:
          - '@ngrx/*'
      capacitor:
        patterns:
          - '@capacitor/*'
          - '@capawesome/*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'typescript-eslint'

  # ==========================================
  # GitHub Actions (Weekly Updates - SECURITY)
  # ==========================================
  # Automatically updates pinned action SHAs when new versions release
  # This is critical for security: keeps SHA pins up-to-date with patches
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Berlin'
    cooldown:
      default-days: 3
    # Limit concurrent PRs to avoid overwhelming maintainers
    open-pull-requests-limit: 5

    # Require @johannesjo approval (matches CODEOWNERS)
    reviewers:
      - 'johannesjo'

    # Label PRs for easy filtering and security awareness
    labels:
      - 'dependencies'
      - 'security'
      - 'github-actions'

    # Consistent commit message format
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

    # Group minor and patch updates together to reduce PR noise
    groups:
      github-actions-minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      softprops-action-gh-release-major:
        patterns:
          - 'softprops/action-gh-release'
        update-types:
          - 'major'
