<div class="schedule-nav-controls">
  <button
    mat-icon-button
    (click)="goToPreviousPeriod()"
    [disabled]="isViewingToday()"
    [attr.aria-label]="
      isMonthView()
        ? (T.F.SCHEDULE.PREVIOUS_MONTH | translate)
        : (T.F.SCHEDULE.PREVIOUS_WEEK | translate)
    "
    [matTooltip]="
      isMonthView()
        ? (T.F.SCHEDULE.PREVIOUS_MONTH | translate)
        : (T.F.SCHEDULE.PREVIOUS_WEEK | translate)
    "
  >
    <mat-icon>chevron_left</mat-icon>
  </button>

  <button
    mat-button
    (click)="goToToday()"
    [disabled]="isViewingToday()"
    [attr.aria-label]="T.F.SCHEDULE.NOW | translate"
  >
    {{ T.F.SCHEDULE.NOW | translate }}
  </button>

  <button
    mat-icon-button
    (click)="goToNextPeriod()"
    [attr.aria-label]="
      isMonthView()
        ? (T.F.SCHEDULE.NEXT_MONTH | translate)
        : (T.F.SCHEDULE.NEXT_WEEK | translate)
    "
    [matTooltip]="
      isMonthView()
        ? (T.F.SCHEDULE.NEXT_MONTH | translate)
        : (T.F.SCHEDULE.NEXT_WEEK | translate)
    "
  >
    <mat-icon>chevron_right</mat-icon>
  </button>
</div>

<div
  class="scroll-wrapper"
  [attr.data-horizontal-scroll]="shouldEnableHorizontalScroll() || null"
>
  @if (isMonthView()) {
    <schedule-month
      [events]="events()"
      [daysToShow]="daysToShow()"
      [weeksToShow]="weeksToShow()"
      [firstDayOfWeek]="firstDayOfWeek()"
    ></schedule-month>
  } @else {
    <schedule-week
      [events]="events()"
      [beyondBudget]="beyondBudget()"
      [daysToShow]="daysToShow()"
      [workStartEnd]="workStartEnd() || null"
      [currentTimeRow]="currentTimeRow()"
      [todayDateStr]="_todayDateStr()"
      [isHorizontalScrollMode]="shouldEnableHorizontalScroll()"
    ></schedule-week>
  }
</div>
