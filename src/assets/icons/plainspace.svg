<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 24 104 78" fill="currentColor">
  <!-- Two-figure group mark (matches the Plainspace brand logo). The front
       figure knocks a transparent gap out of the back figure so the pair stays
       readable as a single-color icon that inherits the theme's currentColor. -->
  <mask id="plainspace-front">
    <rect width="128" height="128" fill="white" />
    <g fill="black" stroke="black" stroke-width="10">
      <circle cx="84" cy="48" r="16" />
      <path d="M60 94 a24 24 0 0 1 48 0 z" />
    </g>
  </mask>
  <g mask="url(#plainspace-front)">
    <circle cx="44" cy="48" r="16" />
    <path d="M20 94 a24 24 0 0 1 48 0 z" />
  </g>
  <circle cx="84" cy="48" r="16" />
  <path d="M60 94 a24 24 0 0 1 48 0 z" />
</svg>
